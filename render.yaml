services:
  - type: web
    name: portfoliou-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: portfoliou-redis
          property: connectionString

  - type: redis
    name: portfoliou-redis
    plan: free
    ipAllowList: []
